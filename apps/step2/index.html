<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Step2 | 투자 포트폴리오 구성</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <header>
        <p class="eyebrow">INDIVIDUALSAVINGS FLOW UIUX · STEP 2</p>
        <h1>투자 포트폴리오 구성</h1>
        <p class="lead">Step1 데이터(월 투자여력/기존 자산)를 바탕으로 포트폴리오 구성을 설계하는 단계입니다.</p>
        <div class="actions">
          <a class="btn btn-ghost" href="../step1/">Step1으로 이동</a>
          <button id="loadStep1Data" class="btn btn-primary" type="button">Step1 데이터 가져오기</button>
        </div>
      </header>
      <section class="panel">
        <h2>Step1 브리지 데이터</h2>
        <p id="bridgeStatus" class="muted">최신 Step1 브리지 데이터를 확인합니다.</p>
        <div class="bridge-grid">
          <p><strong>기준시점</strong><span id="bridgeTimestamp">-</span></p>
          <p><strong>월 투자여력</strong><span id="bridgeMonthlyInvestCapacity">-</span></p>
          <p><strong>현재 현금</strong><span id="bridgeCurrentCash">-</span></p>
          <p><strong>현재 투자</strong><span id="bridgeCurrentInvest">-</span></p>
          <p><strong>현재 저축</strong><span id="bridgeCurrentSavings">-</span></p>
        </div>
      </section>

      <section class="panel">
        <h2>포트폴리오 편집</h2>
        <div class="form-grid">
          <label class="control">
            <span>포트폴리오 이름</span>
            <input id="portfolioName" type="text" maxlength="60" />
          </label>
          <label class="control">
            <span>메모</span>
            <textarea id="portfolioNotes" rows="3" maxlength="500"></textarea>
          </label>
        </div>

        <div class="asset-head">
          <h3>자산군 구성</h3>
          <button id="addAsset" class="btn btn-ghost btn-sm" type="button">자산군 추가</button>
        </div>
        <div class="asset-table-head">
          <span>자산군 이름</span>
          <span>목표 비중(%)</span>
          <span>메모</span>
          <span>관리</span>
        </div>
        <div id="assetList" class="asset-list" aria-live="polite"></div>
        <p id="assetSummary" class="muted"></p>

        <div class="actions">
          <button id="savePortfolio" class="btn btn-primary" type="button">포트폴리오 저장</button>
          <button id="resetPortfolio" class="btn btn-ghost" type="button">새 포트폴리오</button>
        </div>
      </section>

      <section class="panel">
        <h2>저장된 포트폴리오</h2>
        <div class="load-row">
          <select id="portfolioSelect" aria-label="저장된 포트폴리오 선택"></select>
          <button id="loadPortfolio" class="btn btn-ghost" type="button">불러오기</button>
          <button id="deletePortfolio" class="btn btn-ghost" type="button">삭제</button>
        </div>
        <p id="portfolioMeta" class="muted"></p>
      </section>

      <p id="step2Feedback" class="feedback" aria-live="polite" hidden></p>
    </main>
    <script src="../../shared/storage/hub-storage.js"></script>
    <script src="app.js"></script>
  </body>
</html>
